<button class="menu-toggle">☰</button>
        <nav class="nav-menu"> <!-- navigointi ratkaisut-->
            <button class="close-menu">X</button>
            <a href="index.html#projektit" class="sivulla">projektit</a>

            <a href="index.html#hakemuskirje">hakemuskirje</a>
        </nav>

    
    </main>
    
    <script>
        const toggle = document.querySelector(".menu-toggle");
        const nav = document.querySelector(".nav-menu");
        const closeBtn = document.querySelector(".close-menu");

        toggle.addEventListener("click", () => {
            nav.classList.toggle("open");
        });
        closeBtn.addEventListener("click", () => {
            nav.classList.remove("open");
        });

        function scrollToSection(id) {
            const section = document.getElementById(id);
            const container = document.querySelector('.scroll-container');
            if (section && container) {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                const sectionTop = section.offsetTop - container.offsetTop;
                container.scrollTo({ top: sectionTop, behavior: 'smooth' });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                scrollToSection(hash);
            }
        });
    </script>

</body>
